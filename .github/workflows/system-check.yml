name: System Check

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  website-system-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        run: npm run backend:test

      - name: Full launch automation check
        run: npm run automation:launch
